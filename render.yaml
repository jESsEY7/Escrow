# Render Blueprint - Escrow Platform
# https://render.com/docs/blueprint-spec

services:
  # Django Backend
  - type: web
    name: escrow-api
    runtime: python
    region: frankfurt  # or oregon, singapore, etc.
    plan: starter
    buildCommand: |
      pip install -r requirements/production.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn escrow_platform.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: escrow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: escrow-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: escrow-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://escrow-frontend.onrender.com
      # M-Pesa
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_CALLBACK_URL
        value: https://escrow-api.onrender.com/api/transactions/mpesa/callback/

  # React Frontend
  - type: web
    name: escrow-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://escrow-api.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Celery Worker (for background tasks)
  - type: worker
    name: escrow-worker
    runtime: python
    buildCommand: pip install -r requirements/production.txt
    startCommand: celery -A escrow_platform worker --loglevel=info
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        fromService:
          name: escrow-api
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: escrow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: escrow-redis
          type: redis
          property: connectionString

databases:
  - name: escrow-db
    plan: starter
    databaseName: escrow_db
    user: escrow_user

# Redis for Celery and caching
# Note: Render's Redis is in beta, may need external Redis
# Alternative: Use Redis Cloud free tier
